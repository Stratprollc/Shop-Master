<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopMaster - Super Shop Management</title>
  </head>
  <body>
    <script>
      // Fix for "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          const originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() {
                return originalFetch;
              },
              set: function(v) {
                // Silently ignore attempts to overwrite fetch to avoid console noise
              }
            });
          }
        } catch (e) {
          console.error('Failed to patch window.fetch', e);
        }
      })();

      window.addEventListener('error', (event) => {
        if (event.message && event.message.includes('Cannot set property fetch')) {
          event.preventDefault();
          event.stopImmediatePropagation();
        }
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
